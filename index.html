<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI FAQ Assistant</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#6366f1);
}

.container{
background:white;
padding:50px;
border-radius:15px;
text-align:center;
width:700px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
color:#4f46e5;
font-size:40px;
margin-bottom:20px;
}

p{
font-size:18px;
margin-bottom:30px;
}

button{
padding:15px 30px;
font-size:18px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#3730a3;
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 AI FAQ Assistant</h1>

<p>
Welcome to the AI FAQ Chatbot.
Get answers to Artificial Intelligence questions instantly.
</p>

<button onclick="window.location.href='chatbot.html'">
Start Chatting
</button>

</div>

</body>
</html>
