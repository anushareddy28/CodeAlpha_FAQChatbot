<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI FAQ Chatbot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:700px;
height:600px;
background:white;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
overflow:hidden;
display:flex;
flex-direction:column;
}

.header{
background:#4f46e5;
color:white;
padding:20px;
text-align:center;
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
background:#f9fafb;
}

.message{
padding:12px;
margin:10px 0;
border-radius:10px;
max-width:80%;
}

.bot{
background:#e5e7eb;
}

.user{
background:#4f46e5;
color:white;
margin-left:auto;
text-align:right;
}

.input-area{
display:flex;
padding:15px;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 20px;
margin-left:10px;
background:#4f46e5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#3730a3;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
<h1>🤖 AI FAQ Chatbot</h1>
<p>Ask Questions About Artificial Intelligence</p>
</div>

<div id="messages" class="messages">

<div class="message bot">
Hello! Ask me anything about Artificial Intelligence.
</div>

</div>

<div class="input-area">

<input
id="userInput"
type="text"
placeholder="Ask a question..."
onkeypress="if(event.key==='Enter') sendMessage()">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

const faqs = {

"ai":
"Artificial Intelligence (AI) is the simulation of human intelligence by machines.",

"machine learning":
"Machine Learning is a branch of AI that learns patterns from data.",

"deep learning":
"Deep Learning is a subset of Machine Learning that uses neural networks.",

"chatgpt":
"ChatGPT is an AI chatbot developed by OpenAI.",

"nlp":
"Natural Language Processing helps computers understand human language.",

"computer vision":
"Computer Vision enables computers to understand images and videos.",

"generative ai":
"Generative AI creates new content such as text, images, audio and code."

};

function addMessage(text,type){

const messages=document.getElementById("messages");

const div=document.createElement("div");

div.className="message "+type;

div.innerText=text;

messages.appendChild(div);

messages.scrollTop=messages.scrollHeight;

}

function findAnswer(question){

question=question.toLowerCase();

for(let key in faqs){

if(question.includes(key)){

return faqs[key];

}

}

return "Sorry, I couldn't find an answer. Try asking about AI, Machine Learning, ChatGPT, NLP or Computer Vision.";

}

function sendMessage(){

const input=document.getElementById("userInput");

const text=input.value.trim();

if(text==="") return;

addMessage(text,"user");

input.value="";

setTimeout(()=>{

const answer=findAnswer(text);

addMessage(answer,"bot");

},500);

}

</script>

</body>
</html>
